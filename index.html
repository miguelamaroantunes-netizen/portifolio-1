<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfólio | Seu Nome</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --purple: #6C63FF;
      --pink:   #FF6584;
      --dark:   #111827;
      --card:   #1f2937;
      --text:   #e5e7eb;
      --muted:  #9ca3af;
      --border: rgba(108,99,255,.2);
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--dark);
      color: var(--text);
      line-height: 1.6;
    }

    a { color: inherit; text-decoration: none; }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 5%;
      height: 64px;
      background: rgba(17,24,39,.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
    }
    .logo { font-weight: 700; font-size: 1.2rem; color: var(--purple); }

    /* HERO */
    #hero {
      min-height: 100vh;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      text-align: center;
      padding: 80px 5% 40px;
      background: radial-gradient(ellipse at top, #1e1b4b 0%, var(--dark) 60%);
    }
    .avatar {
      width: 110px; height: 110px;
      border-radius: 50%;
      background: var(--card);
      border: 3px solid var(--purple);
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem;
      margin-bottom: 24px;
    }
    #hero h1 { font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 700; margin-bottom: 8px; }
    #hero h1 span { color: var(--purple); }
    #hero p { color: var(--muted); font-size: 1.05rem; max-width: 480px; margin-bottom: 32px; }

    /* SECTION BASE */
    section { padding: 80px 5%; max-width: 1200px; margin: 0 auto; }
    section h2 { font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; }
    section h2 span { color: var(--purple); }
    .sub { color: var(--muted); margin-bottom: 40px; font-size: .95rem; }
    hr { border: none; border-top: 1px solid var(--border); margin: 0; }

    /* PROJETOS */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: transform .2s, border-color .2s;
      cursor: default;
    }
    .card.has-link { cursor: pointer; }
    .card.has-link:hover { transform: translateY(-6px); border-color: var(--purple); }

    .card-top {
      height: 120px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.8rem;
    }
    .card-body { padding: 18px; }
    .card-num {
      font-size: .7rem; font-weight: 700;
      color: var(--purple); margin-bottom: 6px;
      letter-spacing: 1px;
    }
    .card-body h3 { font-size: .95rem; margin-bottom: 6px; }
    .card-body p { color: var(--muted); font-size: .82rem; }
    .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .tag {
      font-size: .68rem; font-weight: 600;
      padding: 2px 9px; border-radius: 100px;
      background: rgba(108,99,255,.15);
      color: var(--purple);
    }

    /* CONTATO */
    #contact { text-align: center; }
    .contact-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      max-width: 540px;
      margin: 0 auto;
    }
    .email-btn {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 13px 28px;
      background: var(--purple);
      color: #fff;
      border-radius: 8px;
      font-size: .95rem; font-weight: 600;
      transition: opacity .2s, transform .2s;
    }
    .email-btn:hover { opacity: .85; transform: translateY(-2px); }

    /* RODAPÉ */
    footer {
      text-align: center;
      padding: 28px;
      color: var(--muted);
      font-size: .82rem;
      border-top: 1px solid var(--border);
    }
    footer span { color: var(--pink); }

    /* BACK TO TOP */
    #top-btn {
      position: fixed; bottom: 24px; right: 24px;
      width: 42px; height: 42px;
      background: var(--purple);
      color: #fff;
      border: none; border-radius: 8px;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      opacity: 0; pointer-events: none;
      transition: all .2s;
      z-index: 99;
    }
    #top-btn.show { opacity: 1; pointer-events: all; }
    #top-btn:hover { transform: translateY(-3px); }

    /* RESPONSIVO */
    @media (max-width: 768px) {
      .grid { grid-template-columns: 1fr; }
    }
    @media (min-width: 769px) and (max-width: 1024px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <span class="logo">&lt;SeuNome /&gt;</span>
  </nav>

  <!-- HERO -->
  <section id="hero">
    <div class="avatar">🧑‍💻</div>
    <h1>Olá, sou <span>Miguel</span></h1>
    <p>Desenvolvedor Full-Stack apaixonado por criar interfaces bonitas e produtos que funcionam de verdade.</p>
  </section>

  <div style="max-width:1200px;margin:0 auto;padding:0 5%;"><hr /></div>

  <!-- PROJETOS -->
  <section id="projects">
    <h2>Meus <span>Projetos</span></h2>
    <p class="sub">Uma seleção do que já construí.</p>
    <div class="grid" id="grid"></div>
  </section>

  <div style="max-width:1200px;margin:0 auto;padding:0 5%;"><hr /></div>

  <!-- CONTATO -->
  <section id="contact">
    <h2>Entre em <span>Contato</span></h2>
    <div class="contact-card">
      <a href="mailto:contato@seusite.dev" class="email-btn">
        <i class="fas fa-envelope"></i> ...................
      </a>
    </div>
  </section>

  <!-- RODAPÉ -->
  <footer>
    <p>&copy; <span id="year"></span> Seu Nome. Feito com <span>♥</span></p>
  </footer>

  <button id="top-btn" aria-label="Voltar ao topo"><i class="fas fa-arrow-up"></i></button>

  <script>
    /* ================================================================
       ✏️  EDITE APENAS AQUI — dados de todos os projetos
       - title  : nome do projeto
       - desc   : descrição curta
       - icon   : emoji que aparece no card
       - tag    : categoria (ex: 'Código', 'Apresentação', 'Link')
       - link   : URL externa — use '' para deixar sem link
    ================================================================ */
    const PROJECTS = [
      { title: 'Projeto 1 — ..........',     desc: '............',   icon: '⚡', tag: 'Código',        link: '..............' },
      
     ];

    /* ================================================================
       🎨 CORES DOS CARDS — um gradiente por projeto (ordem sequencial)
    ================================================================ */
    const GRADIENTS = [
      'linear-gradient(135deg,#1e1b4b,#312e81)',
      'linear-gradient(135deg,#0f3460,#533483)',
      'linear-gradient(135deg,#1e3c72,#2a5298)',
      'linear-gradient(135deg,#2d1b69,#11998e)',
      'linear-gradient(135deg,#134e5e,#71b280)',
      'linear-gradient(135deg,#4a0072,#7b2ff7)',
      'linear-gradient(135deg,#0d0d1a,#6C63FF)',
      'linear-gradient(135deg,#1a1a2e,#e94560)',
      'linear-gradient(135deg,#0f2027,#203a43)',
      'linear-gradient(135deg,#232526,#414345)',
      'linear-gradient(135deg,#16213e,#0f3460)',
      'linear-gradient(135deg,#1f0036,#7b2ff7)',
    ];

    /* ── Renderiza os cards ───────────────────────────────────────── */
    const grid = document.getElementById('grid');

    PROJECTS.forEach((p, i) => {
      const grad    = GRADIENTS[i % GRADIENTS.length];
      const hasLink = p.link && p.link.trim() !== '';

      const card = document.createElement('div');
      card.className = 'card' + (hasLink ? ' has-link' : '');

      card.innerHTML = `
        <div class="card-top" style="background:${grad}">${p.icon}</div>
        <div class="card-body">
          <div class="tags"><span class="tag">${p.tag}</span></div>
          <div class="card-num">Nº ${String(i + 1).padStart(2, '0')}</div>
          <h3>${p.title}</h3>
          <p>${p.desc}</p>
        </div>
      `;

      if (hasLink) {
        card.addEventListener('click', () => window.open(p.link, '_blank'));
        card.title = 'Clique para abrir o projeto';
      }

      grid.appendChild(card);
    });

    /* ── Ano dinâmico ────────────────────────────────────────────── */
    document.getElementById('year').textContent = new Date().getFullYear();

    /* ── Botão voltar ao topo ────────────────────────────────────── */
    const topBtn = document.getElementById('top-btn');
    window.addEventListener('scroll', () => topBtn.classList.toggle('show', scrollY > 300));
    topBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
  </script>
</body>
</html>
